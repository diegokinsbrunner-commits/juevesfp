<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#051008">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Jueves FC">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jueves FC ⚽</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --g:#2ecc71; --dg:#27ae60; --bg:#051008; --bg2:#0a1a0d; --bg3:#111f14;
      --card:#0c1c0f; --border:#1a3520; --text:#e0ece0; --muted:#4a6a4a;
      --gold:#f1c40f; --silver:#bdc3c7; --bronze:#cd7f32;
      --red:#e74c3c; --orange:#f39c12; --r:14px;
    }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; min-height:100dvh; overflow-x:hidden; }
    .screen { display:none; min-height:100dvh; flex-direction:column; }
    .screen.active { display:flex; }
    .header { background:var(--bg2); padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:2px solid var(--border); position:sticky; top:0; z-index:10; }
    .header-title { font-size:19px; font-weight:800; letter-spacing:.5px; flex:1; }
    .back-btn { background:none; border:none; color:var(--g); font-size:26px; cursor:pointer; padding:2px 8px 2px 0; line-height:1; }
    .tabs { display:flex; background:var(--bg2); border-bottom:2px solid var(--border); }
    .tab { flex:1; padding:11px 2px; background:none; border:none; border-bottom:3px solid transparent; color:var(--muted); font-family:inherit; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
    .tab.active { color:var(--g); border-bottom-color:var(--g); }
    .btn { border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-weight:700; letter-spacing:1px; text-transform:uppercase; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-primary { background:var(--g); color:#051008; padding:15px 24px; font-size:15px; width:100%; }
    .btn-primary:active { transform:scale(.97); background:var(--dg); }
    .btn-primary:disabled { background:#1a3520; color:#2a4a2a; cursor:not-allowed; transform:none; }
    .btn-secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border); padding:13px 24px; font-size:13px; width:100%; }
    .btn-secondary:active { transform:scale(.97); }
    .btn-ghost { background:none; border:none; color:var(--muted); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; padding:8px; }
    .lbl { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:7px; display:block; }
    .input { width:100%; padding:13px 14px; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-family:inherit; font-size:16px; outline:none; transition:border-color .2s; }
    .input:focus { border-color:var(--g); }
    select.input { cursor:pointer; }
    textarea.input { resize:none; font-size:13px; font-family:monospace; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:20px; margin:14px 16px; }
    .card+.card { margin-top:0; }
    .table-wrap { overflow-x:auto; padding-bottom:80px; flex:1; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    thead th { padding:10px 5px; text-align:center; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--g); background:var(--bg2); position:sticky; top:0; z-index:5; }
    thead th:nth-child(2) { text-align:left; padding-left:8px; }
    tbody tr { border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    tbody tr:active { background:var(--bg3); }
    tbody td { padding:11px 5px; text-align:center; }
    tbody td:nth-child(2) { text-align:left; font-weight:700; font-size:15px; padding-left:8px; }
    tr.r1 { border-left:3px solid var(--gold); }
    tr.r2 { border-left:3px solid var(--silver); }
    tr.r3 { border-left:3px solid var(--bronze); }
    .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:12px; font-weight:700; }
    .b-hi { background:rgba(46,204,113,.15); color:var(--g); }
    .b-mid { background:rgba(243,156,18,.15); color:var(--orange); }
    .b-lo { background:rgba(231,76,60,.12); color:var(--red); }

    /* RESULT TYPE BUTTONS */
    .res-type { display:flex; gap:8px; margin-bottom:18px; }
    .rt-btn { flex:1; padding:12px 8px; background:var(--bg); border:2px solid var(--border); border-radius:12px; color:var(--muted); text-align:center; cursor:pointer; font-family:inherit; transition:all .2s; }
    .rt-btn.sel { border-color:var(--g); background:rgba(46,204,113,.1); color:var(--g); }
    .rt-btn:active { transform:scale(.97); }
    .rt-btn .rt-icon { font-size:22px; margin-bottom:4px; }
    .rt-btn .rt-lbl { font-size:12px; font-weight:700; }

    /* PLAYER SELECTOR ROWS */
    .ps-row {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:10px; margin-bottom:6px;
      background:var(--bg); border:1.5px solid var(--border);
      transition:all .2s;
    }
    .ps-row.in-a { border-color:var(--g); background:rgba(46,204,113,.08); }
    .ps-row.in-b { border-color:var(--red); background:rgba(231,76,60,.08); }
    .ps-name { flex:1; font-size:15px; font-weight:600; }
    .ps-btns { display:flex; gap:6px; }
    .ps-btn { width:38px; height:28px; border:1.5px solid var(--border); border-radius:7px; background:var(--bg2); color:var(--muted); font-size:11px; font-weight:800; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
    .ps-btn.act-a { background:var(--g); border-color:var(--g); color:#051008; }
    .ps-btn.act-b { background:var(--red); border-color:var(--red); color:#fff; }
    .ps-btn:active { transform:scale(.9); }

    /* MATCH SUMMARY */
    .match-summary { background:var(--bg2); border-radius:10px; padding:12px 14px; margin:12px 0; font-size:13px; line-height:1.6; border:1px solid var(--border); }
    .sum-team { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
    .sum-chip { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
    .sum-chip-a { background:rgba(46,204,113,.15); color:var(--g); }
    .sum-chip-b { background:rgba(231,76,60,.12); color:var(--red); }
    .sum-chip-em { background:rgba(243,156,18,.12); color:var(--orange); }

    /* HOME */
    .home-hero { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 28px; text-align:center; background:radial-gradient(ellipse at 50% 30%,#0d2a14 0%,#051008 70%); }
    .home-logo { font-size:88px; margin-bottom:16px; filter:drop-shadow(0 0 40px rgba(46,204,113,.3)); }
    .home-title { font-size:38px; font-weight:900; letter-spacing:-1px; }
    .home-sub { font-size:12px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:50px; }
    .home-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px; }

    /* PLAYER CARD */
    .p-card { background:linear-gradient(145deg,#0a2010,#051008); border:1px solid var(--border); border-radius:20px; padding:32px 24px 28px; margin:16px; text-align:center; position:relative; overflow:hidden; }
    .p-card::before { content:'⚽'; position:absolute; font-size:220px; opacity:.025; top:-30px; right:-50px; pointer-events:none; }
    .p-name { font-size:44px; font-weight:900; letter-spacing:-1px; margin-bottom:6px; }
    .p-pos-badge { display:inline-block; background:var(--g); color:#051008; font-size:12px; font-weight:800; letter-spacing:3px; text-transform:uppercase; padding:4px 18px; border-radius:20px; margin-bottom:28px; }
    .p-pts { font-size:76px; font-weight:900; color:var(--g); line-height:1; }
    .p-pts-lbl { font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:28px; }
    .p-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
    .stat-box { background:var(--bg2); border-radius:12px; padding:14px 8px; }
    .stat-val { font-size:30px; font-weight:800; }
    .stat-lbl { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:2px; }
    .efec-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
    .efec-bar-bg { background:var(--bg2); border-radius:10px; height:8px; overflow:hidden; }
    .efec-bar-fill { height:100%; border-radius:10px; transition:width .8s ease; }
    .p-item { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    .p-item:active { background:var(--bg3); }
    .p-item-name { font-size:17px; font-weight:700; }
    .p-item-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .mini-row { display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:8px; }
    .mini-row.me { background:rgba(46,204,113,.07); }
    .code-box { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; font-family:monospace; font-size:11px; color:var(--muted); word-break:break-all; margin:12px 0; max-height:72px; overflow:hidden; }
    .m-item { display:flex; justify-content:space-between; align-items:flex-start; padding:13px 18px; border-bottom:1px solid var(--border); font-size:14px; gap:10px; }
    .m-time { font-size:11px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(90px); background:var(--g); color:#051008; padding:12px 26px; border-radius:30px; font-weight:800; font-size:14px; letter-spacing:.5px; transition:transform .3s ease; z-index:999; pointer-events:none; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .fab { position:fixed; bottom:24px; right:20px; width:52px; height:52px; border-radius:50%; background:var(--bg3); border:1.5px solid var(--border); color:var(--muted); font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:50; transition:all .2s; box-shadow:0 4px 20px rgba(0,0,0,.4); }
    .fab:active { transform:scale(.9); }
    #screen-present { background:radial-gradient(ellipse at 50% 20%,#0d3020,#020b04); }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-hero">
    <div class="home-logo">⚽</div>
    <div class="home-title">Jueves FC</div>
    <div class="home-sub">Campeonato Semanal</div>
    <div class="home-btns">
      <button class="btn btn-primary" onclick="goAdminLogin()">🔐 Administrador</button>
      <button class="btn btn-secondary" onclick="goPlayerSelect()">👤 Ver mis stats</button>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="screen" id="screen-login">
  <div class="header">
    <button class="back-btn" onclick="show('home')">←</button>
    <div class="header-title">Acceso Admin</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px;">
    <div class="card">
      <label class="lbl">Contraseña</label>
      <input type="password" class="input" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" style="margin-bottom:16px;">
      <button class="btn btn-primary" onclick="doLogin()">Entrar →</button>
      <div id="login-err" style="color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none;">Contraseña incorrecta</div>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="screen" id="screen-admin">
  <div class="header">
    <span style="font-size:22px;">⚽</span>
    <div class="header-title">Jueves FC</div>
    <button class="btn-ghost" onclick="doLogout()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab active"  id="t-tabla"     onclick="tab('tabla')">📊 Tabla</button>
    <button class="tab"         id="t-partido"   onclick="tab('partido')">➕ Fecha</button>
    <button class="tab"         id="t-historial" onclick="tab('historial')">📋 Historial</button>
    <button class="tab"         id="t-compartir" onclick="tab('compartir')">🔗 Compartir</button>
  </div>

  <!-- TAB TABLA -->
  <div id="p-tabla" class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th style="text-align:left;padding-left:8px">Jugador</th>
        <th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>PTS</th><th>EFEC</th>
      </tr></thead>
      <tbody id="admin-tbody"></tbody>
    </table>
  </div>

  <!-- TAB PARTIDO (nueva fecha) -->
  <div id="p-partido" style="display:none;overflow-y:auto;padding-bottom:90px;">
    <div class="card">

      <!-- Fecha -->
      <label class="lbl">📅 Fecha del partido</label>
      <input type="date" class="input" id="match-date" style="margin-bottom:18px;">

      <!-- Tipo de resultado -->
      <label class="lbl">Resultado</label>
      <div class="res-type">
        <button class="rt-btn sel" id="rt-victoria" onclick="setResType('victoria')">
          <div class="rt-icon">🏆</div>
          <div class="rt-lbl">Victoria</div>
        </button>
        <button class="rt-btn" id="rt-empate" onclick="setResType('empate')">
          <div class="rt-icon">🤝</div>
          <div class="rt-lbl">Empate</div>
        </button>
      </div>

      <!-- Labels de equipos -->
      <div style="display:flex;gap:16px;margin-bottom:8px;">
        <div style="flex:1;display:flex;align-items:center;gap:6px;">
          <span id="label-a" style="font-size:10px;letter-spacing:2px;color:var(--g);text-transform:uppercase;font-weight:700;">🏆 Ganadores</span>
          <span id="count-a" style="background:rgba(46,204,113,.15);color:var(--g);font-size:11px;font-weight:800;padding:1px 8px;border-radius:10px;">0</span>
        </div>
        <div style="flex:1;display:flex;align-items:center;gap:6px;">
          <span id="label-b" style="font-size:10px;letter-spacing:2px;color:var(--red);text-transform:uppercase;font-weight:700;">❌ Perdedores</span>
          <span id="count-b" style="background:rgba(231,76,60,.12);color:var(--red);font-size:11px;font-weight:800;padding:1px 8px;border-radius:10px;">0</span>
        </div>
      </div>

      <!-- Lista de jugadores -->
      <div id="player-selector" style="margin-bottom:14px;max-height:340px;overflow-y:auto;"></div>

      <!-- Resumen -->
      <div id="match-summary" style="display:none;" class="match-summary"></div>

      <button class="btn btn-primary" id="btn-ok" onclick="confirmTeamMatch()" disabled style="margin-top:4px;">✓ Confirmar Fecha</button>
    </div>

    <!-- Nuevo jugador -->
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px;">➕ Agregar jugador nuevo</div>
      <label class="lbl">Nombre</label>
      <input type="text" class="input" id="new-player-name" placeholder="Nombre del jugador" style="margin-bottom:12px;">
      <button class="btn btn-secondary" onclick="addNewPlayer()">Agregar</button>
    </div>
  </div>

  <!-- TAB HISTORIAL -->
  <div id="p-historial" style="display:none;overflow-y:auto;padding-bottom:80px;flex:1;">
    <div id="hist-list"></div>
  </div>

  <!-- TAB COMPARTIR -->
  <div id="p-compartir" style="display:none;overflow-y:auto;padding-bottom:80px;">
    <div class="card">
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6;">
        Generá un link y envialo por WhatsApp. Los jugadores lo abren y ven sus stats al instante.
      </div>
      <button class="btn btn-primary" onclick="genLink()" style="margin-bottom:12px;">📤 Generar Link</button>
      <div id="share-box" style="display:none;">
        <div class="code-box" id="share-url"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary" onclick="copyLink()" style="flex:1;">📋 Copiar</button>
          <button class="btn btn-primary"   onclick="shareLink()" style="flex:1;">📲 Compartir</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;">Restaurar datos</div>
      <label class="lbl">Código de respaldo</label>
      <textarea class="input" id="import-in" rows="3" placeholder="Pegá el código acá..."></textarea>
      <button class="btn btn-secondary" onclick="doImport()" style="margin-top:10px;">Importar</button>
    </div>
  </div>

  <div class="fab" id="fab" style="display:none;" onclick="undoLast()" title="Deshacer último partido">↩</div>
</div>

<!-- PLAYER SELECT -->
<div class="screen" id="screen-players">
  <div class="header">
    <button class="back-btn" onclick="show('home')">←</button>
    <div class="header-title">¿Quién sos?</div>
  </div>
  <div style="padding:10px 16px;border-bottom:1px solid var(--border);">
    <input type="text" class="input" id="p-search" placeholder="🔍 Buscar..." oninput="filterList()">
  </div>
  <div style="padding:10px 16px 8px;border-bottom:1px solid var(--border);">
    <label class="lbl">¿Tenés un link o código de sync?</label>
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="text" class="input" id="sync-in" placeholder="Pegá el link o código..." style="font-size:13px;">
      <button class="btn btn-secondary" onclick="playerSync()" style="width:auto;padding:13px 16px;white-space:nowrap;">Cargar</button>
    </div>
  </div>
  <div id="p-list" style="overflow-y:auto;flex:1;padding-bottom:40px;"></div>
</div>

<!-- PLAYER CARD -->
<div class="screen" id="screen-card">
  <div class="header" id="card-header">
    <button class="back-btn" id="card-back">←</button>
    <div class="header-title" id="card-title">Stats</div>
    <button class="btn-ghost" id="btn-present" onclick="goPresent()" style="display:none;">⊞ Presentar</button>
  </div>
  <div id="card-content" style="overflow-y:auto;flex:1;padding-bottom:40px;"></div>
</div>

<!-- PRESENTATION -->
<div class="screen" id="screen-present">
  <div style="display:flex;justify-content:flex-end;padding:12px 16px;">
    <button class="btn-ghost" onclick="show('card')" style="font-size:16px;">✕ Cerrar</button>
  </div>
  <div id="present-content" style="overflow-y:auto;flex:1;padding-bottom:40px;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
const PASS = "Agus2026";

// ─── DATOS INICIALES ──────────────────────────────────────────
const DEFAULTS = [
  {name:"Hernán", pj:15,pg:12,pe:2,pp:1},
  {name:"Diego",  pj:21,pg:12,pe:2,pp:7},
  {name:"Rama",   pj:15,pg:10,pe:2,pp:3},
  {name:"Leo",    pj:16,pg:10,pe:1,pp:5},
  {name:"Dani",   pj:20,pg:9, pe:2,pp:9},
  {name:"Quique", pj:14,pg:7, pe:2,pp:5},
  {name:"Fer",    pj:19,pg:7, pe:2,pp:10},
  {name:"Pico",   pj:20,pg:7, pe:2,pp:11},
  {name:"Ernesto",pj:14,pg:6, pe:3,pp:5},
  {name:"Sebas",  pj:13,pg:5, pe:2,pp:6},
  {name:"Ogro",   pj:15,pg:5, pe:2,pp:8},
  {name:"Juan",   pj:16,pg:5, pe:1,pp:10},
  {name:"Tomás",  pj:15,pg:5, pe:0,pp:10},
  {name:"Agus",   pj:5, pg:4, pe:1,pp:0},
  {name:"Fede",   pj:8, pg:4, pe:1,pp:3},
  {name:"Lauti",  pj:9, pg:4, pe:1,pp:4},
  {name:"Alexis", pj:8, pg:4, pe:0,pp:4},
  {name:"Carly",  pj:6, pg:3, pe:0,pp:3},
  {name:"Benja",  pj:9, pg:3, pe:1,pp:5},
  {name:"Pipa",   pj:5, pg:2, pe:0,pp:3},
  {name:"Carlos", pj:1, pg:1, pe:0,pp:0},
  {name:"Walter", pj:1, pg:1, pe:0,pp:0},
  {name:"Alan",   pj:3, pg:0, pe:0,pp:3},
  {name:"Alejo",  pj:2, pg:0, pe:0,pp:2},
  {name:"Edu",    pj:1, pg:0, pe:0,pp:1},
];

// ─── ESTADO ───────────────────────────────────────────────────
let S = { players: deep(DEFAULTS), matches: [] };
let teamA = new Set();  // ganadores (o equipo A en empate)
let teamB = new Set();  // perdedores (o equipo B en empate)
let resType = 'victoria';

function deep(x){ return JSON.parse(JSON.stringify(x)); }

// ─── PERSISTENCIA ─────────────────────────────────────────────
function load(){
  try {
    const d = JSON.parse(localStorage.getItem('jfc2'));
    if(d?.players) S.players = d.players;
    if(d?.matches) S.matches = d.matches;
  } catch(e){}
}
function save(){
  try { localStorage.setItem('jfc2', JSON.stringify({players:S.players, matches:S.matches})); } catch(e){}
}

// ─── HELPERS ──────────────────────────────────────────────────
function pts(p)  { return p.pg*3 + p.pe; }
function efec(p) { return p.pj===0 ? 0 : Math.round(pts(p)/(p.pj*3)*100); }
function sorted(){ return [...S.players].sort((a,b)=>pts(b)-pts(a)||efec(b)-efec(a)); }
function pos(name){ return sorted().findIndex(p=>p.name===name)+1; }
function eClass(e){ return e>=65?'b-hi':e>=45?'b-mid':'b-lo'; }
function medal(i){ return ['🥇','🥈','🥉'][i] ?? (i+1); }
function eColor(e){ return e>=65?'var(--g)':e>=45?'var(--orange)':'var(--red)'; }
function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

// ─── ROUTING ──────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ─── AUTH ─────────────────────────────────────────────────────
function goAdminLogin(){ show('login'); setTimeout(()=>document.getElementById('pwd').focus(),100); }
function doLogin(){
  if(document.getElementById('pwd').value === PASS){
    document.getElementById('pwd').value='';
    document.getElementById('login-err').style.display='none';
    show('admin'); renderTable(); initPartidoTab();
  } else {
    document.getElementById('login-err').style.display='block';
  }
}
function doLogout(){ show('home'); }

// ─── TABS ─────────────────────────────────────────────────────
function tab(t){
  ['tabla','partido','historial','compartir'].forEach(x=>{
    document.getElementById('t-'+x).classList.toggle('active', x===t);
    document.getElementById('p-'+x).style.display = x===t?'':'none';
  });
  if(t==='tabla') renderTable();
  if(t==='historial') renderHist();
  document.getElementById('fab').style.display = t==='partido'?'flex':'none';
}

// ─── TABLA ADMIN ──────────────────────────────────────────────
function renderTable(){
  const rows = sorted();
  document.getElementById('admin-tbody').innerHTML = rows.map((p,i)=>{
    const e=efec(p), rc=i<3?` class="r${i+1}"`:' class=""';
    return `<tr${rc} onclick="adminCard('${p.name}')">
      <td style="color:var(--muted);font-size:12px;">${medal(i)}</td>
      <td>${p.name}</td>
      <td style="color:var(--muted)">${p.pj}</td>
      <td style="color:var(--g);font-weight:700">${p.pg}</td>
      <td style="color:var(--orange)">${p.pe}</td>
      <td style="color:var(--red)">${p.pp}</td>
      <td style="font-weight:800;font-size:16px">${pts(p)}</td>
      <td><span class="badge ${eClass(e)}">${e}%</span></td>
    </tr>`;
  }).join('');
}

function adminCard(name){
  S.curPlayer=name;
  document.getElementById('btn-present').style.display='flex';
  document.getElementById('card-back').onclick=()=>{show('admin');renderTable();};
  document.getElementById('card-title').textContent=name;
  renderCard('card-content',name);
  show('card');
}

// ─── NUEVA FECHA (TEAM MATCH) ─────────────────────────────────
function initPartidoTab(){
  teamA = new Set();
  teamB = new Set();
  resType = 'victoria';
  document.getElementById('match-date').value = todayStr();
  renderPlayerSelector();
  updateSummary();
}

function setResType(type){
  resType = type;
  document.getElementById('rt-victoria').classList.toggle('sel', type==='victoria');
  document.getElementById('rt-empate').classList.toggle('sel', type==='empate');
  const la = document.getElementById('label-a');
  const lb = document.getElementById('label-b');
  if(type==='victoria'){
    la.textContent='🏆 Ganadores'; la.style.color='var(--g)';
    lb.textContent='❌ Perdedores'; lb.style.color='var(--red)';
  } else {
    la.textContent='⚽ Equipo A'; la.style.color='var(--orange)';
    lb.textContent='⚽ Equipo B'; lb.style.color='var(--orange)';
  }
  renderPlayerSelector();
  updateSummary();
}

function renderPlayerSelector(){
  const allPlayers = [...S.players].sort((a,b)=>a.name.localeCompare(b.name));
  const isEmpate = resType === 'empate';
  document.getElementById('player-selector').innerHTML = allPlayers.map(p=>{
    const inA = teamA.has(p.name);
    const inB = teamB.has(p.name);
    const rowClass = inA ? 'ps-row in-a' : inB ? 'ps-row in-b' : 'ps-row';
    const btnAClass = inA ? 'ps-btn act-a' : 'ps-btn';
    const btnBClass = inB ? 'ps-btn act-b' : 'ps-btn';
    const lA = isEmpate ? 'A' : '✓';
    const lB = isEmpate ? 'B' : '✗';
    const colorA = isEmpate ? 'var(--orange)' : 'var(--g)';
    const styleA = inA ? '' : `color:${colorA};border-color:${colorA};`;
    const styleB = inB ? '' : 'color:var(--red);border-color:var(--red);';
    return `<div class="${rowClass}" id="row-${p.name}">
      <div class="ps-name">${p.name}</div>
      <div class="ps-btns">
        <button class="${btnAClass}" style="${inA?'':styleA}" onclick="toggleTeam('${p.name}','a')">${lA}</button>
        <button class="${btnBClass}" style="${inB?'':styleB}" onclick="toggleTeam('${p.name}','b')">${lB}</button>
      </div>
    </div>`;
  }).join('');
}

function toggleTeam(name, team){
  const curr = team==='a' ? teamA : teamB;
  const other = team==='a' ? teamB : teamA;
  if(curr.has(name)){
    curr.delete(name);
  } else {
    other.delete(name);
    curr.add(name);
  }
  renderPlayerSelector();
  updateSummary();
  // update counts
  document.getElementById('count-a').textContent = teamA.size;
  document.getElementById('count-b').textContent = teamB.size;
}

function updateSummary(){
  const sum = document.getElementById('match-summary');
  const ok = document.getElementById('btn-ok');
  const sA = [...teamA], sB = [...teamB];
  document.getElementById('count-a').textContent = sA.length;
  document.getElementById('count-b').textContent = sB.length;

  if(sA.length===0 && sB.length===0){ sum.style.display='none'; ok.disabled=true; return; }

  const isEmpate = resType==='empate';
  const chipClass = isEmpate ? 'sum-chip sum-chip-em' : '';
  const aLabel = isEmpate ? '⚽ Equipo A' : '🏆 Ganadores';
  const bLabel = isEmpate ? '⚽ Equipo B' : '❌ Perdedores';
  const aChip = isEmpate ? 'sum-chip sum-chip-em' : 'sum-chip sum-chip-a';
  const bChip = isEmpate ? 'sum-chip sum-chip-em' : 'sum-chip sum-chip-b';

  let html = '';
  if(sA.length>0) html += `<div style="margin-bottom:8px;"><span style="font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;">${aLabel}</span><div class="sum-team">${sA.map(n=>`<span class="${aChip}">${n}</span>`).join('')}</div></div>`;
  if(sB.length>0) html += `<div><span style="font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;">${bLabel}</span><div class="sum-team">${sB.map(n=>`<span class="${bChip}">${n}</span>`).join('')}</div></div>`;

  sum.innerHTML = html;
  sum.style.display = 'block';
  ok.disabled = !(sA.length>0 && sB.length>0);
}

function confirmTeamMatch(){
  const sA=[...teamA], sB=[...teamB];
  if(sA.length===0||sB.length===0) return;
  const dateVal = document.getElementById('match-date').value;
  const dateStr = fmtDate(dateVal) || todayStr();
  const snap = deep({players:S.players, matches:S.matches});

  S.players = S.players.map(p=>{
    if(resType==='victoria'){
      if(teamA.has(p.name)) return {...p,pj:p.pj+1,pg:p.pg+1};
      if(teamB.has(p.name)) return {...p,pj:p.pj+1,pp:p.pp+1};
    } else {
      if(teamA.has(p.name)||teamB.has(p.name)) return {...p,pj:p.pj+1,pe:p.pe+1};
    }
    return p;
  });

  const label = resType==='victoria'
    ? `${dateStr} — Ganadores: ${sA.join(', ')} | Perdedores: ${sB.join(', ')}`
    : `${dateStr} — Empate: ${sA.join(', ')} vs ${sB.join(', ')}`;

  S.matches.unshift({label, date:dateStr, teamA:sA, teamB:sB, resType, snap});
  save();
  renderTable();
  toast(`✓ Fecha ${dateStr} registrada — ${sA.length+sB.length} jugadores`);
  initPartidoTab();
}

function undoLast(){
  if(!S.matches.length){toast('No hay fecha para deshacer');return;}
  const {snap}=S.matches[0];
  S.players=snap.players; S.matches=snap.matches;
  save(); renderTable(); initPartidoTab();
  toast('↩ Última fecha deshecha');
}

function addNewPlayer(){
  const name=document.getElementById('new-player-name').value.trim();
  if(!name){toast('Ingresá un nombre');return;}
  if(S.players.find(p=>p.name.toLowerCase()===name.toLowerCase())){toast('Ya existe ese jugador');return;}
  S.players.push({name,pj:0,pg:0,pe:0,pp:0});
  save(); renderTable(); renderPlayerSelector();
  document.getElementById('new-player-name').value='';
  toast('✓ '+name+' agregado!');
}

// ─── HISTORIAL ────────────────────────────────────────────────
function renderHist(){
  if(!S.matches.length){
    document.getElementById('hist-list').innerHTML='<div style="text-align:center;padding:48px;color:var(--muted);font-size:14px;">Sin fechas registradas</div>';
    return;
  }
  document.getElementById('hist-list').innerHTML = S.matches.map((m,i)=>`
    <div class="m-item">
      <div>
        ${i===0?'<span class="badge b-hi" style="font-size:10px;margin-right:4px;">ÚLTIMA</span>':''}
        <span style="font-size:13px;">${m.label}</span>
      </div>
    </div>`).join('');
}

// ─── COMPARTIR ────────────────────────────────────────────────
let _url='';
function genLink(){
  const data={players:S.players,matches:S.matches.map(m=>({label:m.label,date:m.date}))};
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  _url=`${location.origin}${location.pathname}#sync=${code}`;
  document.getElementById('share-url').textContent=_url;
  document.getElementById('share-box').style.display='block';
}
function copyLink(){
  navigator.clipboard?.writeText(_url).then(()=>toast('📋 Link copiado!')).catch(()=>{fallCopy(_url);toast('📋 Link copiado!');});
}
function shareLink(){
  if(navigator.share) navigator.share({title:'Jueves FC',text:'Mirá tu posición en el campeonato!',url:_url});
  else copyLink();
}
function fallCopy(t){ const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a); }
function doImport(){
  const code=document.getElementById('import-in').value.trim();
  if(!code) return;
  try {
    let c=code; if(c.includes('#sync=')) c=c.split('#sync=')[1];
    const d=JSON.parse(decodeURIComponent(escape(atob(c))));
    if(d?.players){ S.players=d.players; if(d.matches) S.matches=d.matches; save(); renderTable(); toast('✓ Datos importados!'); document.getElementById('import-in').value=''; }
  } catch(e){ toast('❌ Código inválido'); }
}

// ─── PLAYER SELECT ────────────────────────────────────────────
function goPlayerSelect(){ renderList(); show('players'); }
function renderList(q=''){
  const s=sorted(), f=q?s.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())):s;
  document.getElementById('p-list').innerHTML=f.map(p=>{
    const pn=pos(p.name);
    return `<div class="p-item" onclick="viewCard('${p.name}')">
      <div><div class="p-item-name">${p.name}</div><div class="p-item-sub">Pos. ${pn} · ${pts(p)} pts · ${efec(p)}%</div></div>
      <div style="font-size:26px;">${pn<=3?['🥇','🥈','🥉'][pn-1]:'▶'}</div>
    </div>`;
  }).join('');
}
function filterList(){ renderList(document.getElementById('p-search').value); }
function playerSync(){
  const code=document.getElementById('sync-in').value.trim();
  if(!code) return;
  try {
    let c=code; if(c.includes('#sync=')) c=c.split('#sync=')[1];
    const d=JSON.parse(decodeURIComponent(escape(atob(c))));
    if(d?.players){ S.players=d.players; if(d.matches) S.matches=d.matches; save(); renderList(); document.getElementById('sync-in').value=''; toast('✓ Datos actualizados!'); }
  } catch(e){ toast('❌ Código inválido'); }
}
function viewCard(name){
  S.curPlayer=name;
  document.getElementById('btn-present').style.display='none';
  document.getElementById('card-back').onclick=()=>show('players');
  document.getElementById('card-title').textContent=name;
  renderCard('card-content',name);
  show('card');
}

// ─── PLAYER CARD ──────────────────────────────────────────────
function renderCard(cid,name){
  const p=S.players.find(x=>x.name===name); if(!p) return;
  const pn=pos(name), e=efec(p), ptsV=pts(p), clr=eColor(e);
  const posEmoji=pn===1?'🥇':pn===2?'🥈':pn===3?'🥉':`#${pn}`;
  document.getElementById(cid).innerHTML=`
    <div class="p-card">
      <div class="p-name">${name}</div>
      <div><span class="p-pos-badge">${posEmoji} Puesto ${pn} de ${S.players.length}</span></div>
      <div class="p-pts">${ptsV}</div>
      <div class="p-pts-lbl">Puntos</div>
      <div class="p-stats">
        <div class="stat-box"><div class="stat-val" style="color:var(--g)">${p.pg}</div><div class="stat-lbl">Ganados</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--orange)">${p.pe}</div><div class="stat-lbl">Empates</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--red)">${p.pp}</div><div class="stat-lbl">Perdidos</div></div>
      </div>
      <div style="margin-bottom:14px;">
        <div class="efec-row"><span>Efectividad</span><span style="color:${clr};font-weight:800;">${e}%</span></div>
        <div class="efec-bar-bg"><div class="efec-bar-fill" style="width:${e}%;background:${clr}"></div></div>
      </div>
      <div style="font-size:12px;color:var(--muted);">${p.pj} partidos jugados</div>
    </div>
    <div style="padding:0 16px 16px;">
      <div style="background:var(--bg2);border-radius:14px;padding:14px 16px;">
        <div style="font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Tabla completa</div>
        ${sorted().map((pl,i)=>`
          <div class="mini-row${pl.name===name?' me':''}">
            <div style="width:22px;font-size:13px;text-align:center;">${medal(i)}</div>
            <div style="flex:1;font-weight:${pl.name===name?800:400};color:${pl.name===name?'var(--g)':'inherit'}">${pl.name}</div>
            <div style="font-weight:700;font-size:14px;">${pts(pl)}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ─── PRESENTATION ─────────────────────────────────────────────
function goPresent(){ renderCard('present-content',S.curPlayer); show('present'); }

// ─── TOAST ────────────────────────────────────────────────────
let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── INIT ─────────────────────────────────────────────────────
load();

// Sync desde URL hash
const hash=location.hash;
if(hash.startsWith('#sync=')){
  try {
    const d=JSON.parse(decodeURIComponent(escape(atob(hash.slice(6)))));
    if(d?.players){ S.players=d.players; if(d.matches) S.matches=d.matches; save(); }
  } catch(e){}
  history.replaceState(null,'',location.pathname);
  goPlayerSelect();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
